<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>

<body>

    
    <div class="splash">
        <h1 class="logo">NETFLIX</h1>
        <button class="enter-btn">Entrar</button>
    </div>

    <div class="transition hidden">
        <h1 class="logo">NETFLIX</h1>
    </div>

    <audio id="netflix-sound" src="assets/tudum.mp3"></audio> 

    <div class="app hidden">

        <header>
            <h1>Netflix</h1>
        </header>

        <main>
            <section aria-labelledby="titulo-perfis">
                <h2 id="titulo-perfis">Quem está assistindo?</h2>

                <ul class="profiles">
                    
                    <li class="profile">
                        <figure>
                            <img src="assets/capa1.avif" alt="Perfil de Maria">
                            <figcaption>Maria</figcaption>
                        </figure>
                    </li>

                    <li class="profile">
                        <figure>
                            <img src="assets/capa6.jpg" alt="Perfil de Leticinha">
                            <figcaption>Leticinha</figcaption>
                        </figure>
                    </li>

                    <li class="profile">
                        <figure>
                            <img src="assets/capa5.jpg" alt="Perfil de Pedro">
                            <figcaption>Pedro</figcaption>
                        </figure>
                    </li>

                    <li class="profile add-profile">
                        <button type="button" class="add-box" aria-label="Adicionar novo perfil">
                            <span>+</span>
                        </button>
                        <p>Adicionar perfil</p>
                    </li>
                </ul>         

                <button class="bt-manage-profile">
                    Gerenciar perfis
                </button>

            </section>
        </main>

    </div>

    <script src="script.js"></script>

</body>
</html>
